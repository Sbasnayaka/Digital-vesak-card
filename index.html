<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>A Magical Vesak Night</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

  <audio id="ambient-audio" loop>
    <source src="/audio/vesak-ambient.mp3" type="audio/mpeg">
  </audio>

  <div id="intro-screen">
    <div class="candle-container" id="initial-candle">
      </div>
    <h1 class="intro-title">A Magical Vesak Night</h1>
    <button id="enter-btn" class="glass-btn">Enter the Vesak Garden</button>
  </div>

  <div id="immersive-world">
    <canvas id="ambient-particles"></canvas>

    <div id="parallax-container">
      
      <div class="layer layer-bg" data-depth="0.1">
        <div class="moon"></div>
      </div>

      <div class="layer layer-temple" data-depth="0.25" id="temple-layer">
        </div>

      <div class="layer layer-thoran" data-depth="0.4">
        <div class="thoran-structure" id="thoran-lights">
          </div>
      </div>

      <div class="layer layer-lanterns" data-depth="0.7" id="lantern-container">
        </div>

      <div class="layer layer-foreground" data-depth="0.9" id="lotus-pond">
        <div class="water-reflection"></div>
      </div>
    </div>

    <div class="ui-layer">
      <button id="mute-btn" class="icon-btn">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
      </button>
    </div>

    <div id="blessing-modal" class="hidden">
      <div class="modal-content glass-panel">
        <button id="close-modal" class="close-btn">&times;</button>
        <div class="modal-ornament">
          </div>
        <p id="blessing-text"></p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/scripts/main.js"></script>
</body>
</html>
